project:
  type: book
  output-dir: _book

book:
  title: "Cheticamp River Connectivity Restoration Plan: 2025 – 2035 "
  author: "Canadian Wildlife Federation"
  chapters:
    - index.qmd
    - content/project-overview.qmd
    - content/data-methods.qmd
    - content/glossary.qmd
    - content/work-planning.qmd
    - content/references.qmd
    - content/version-history.qmd
    
    - part: "Appendix A"
      chapters:
        - content/project-partners.qmd
        
    - part: "Appendix B"
      chapters:
        - content/priority-barriers.qmd
        - content/non-actionable-barriers.qmd
        - content/excluded-structures.qmd
        - content/data-deficient-structures.qmd
  
  sidebar: 
    pinned: true
    logo: images/logo.png
    tools: 
      - icon: save
        menu: 
          - text: Word DOCX
            url: _book/Horsefly-River-Watershed-Secwepemcúl’ecw-Connectivity-Remediation-Plan--2021---2040.docx




bibliography: references.bib
# nocite: |
#   @*

format:
  html:
    css: style.css
    theme: cosmo
    toc-title: "WCRP"
    crossref:
      fig-title: '**Figure**'
      tbl-title: '**Table**'
  pdf: 
    toc: true
    toc-depth: 2
    documentclass: scrreprt
    colorlinks: true
  docx:
    toc: true
    number-sections: true
    highlight-style: github
    # reference-doc: custom-reference-doc.docx
    tbl-colwidths: [40, 30, 30]
    keep-md: true
    keep-ipynb: true


